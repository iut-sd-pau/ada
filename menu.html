<!DOCTYPE html><html><head><title>FLASH BRAIN</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<link rel="stylesheet" href="core.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="i18n.js"></script><script src="localnet.js"></script><script src="engine.js"></script><script src="audio.js"></script><script src="boost.js"></script>
<style>
body{padding-bottom:80px;}
.hero{width:100%;padding:26px 20px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.hb{font-size:3.5rem;animation:blt 2.5s ease-in-out infinite alternate;filter:drop-shadow(0 0 16px var(--c));}
@keyframes blt{from{transform:scale(.88)}to{transform:scale(1.1)}}
.hn{font-family:var(--ac);font-size:1.5rem;font-weight:900;color:var(--c);text-shadow:0 0 20px var(--cg);}
.qs{display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:8px;width:100%;max-width:460px;padding:0 20px;margin-bottom:4px;}
.qc{display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 6px;background:var(--bc);border:1px solid var(--br);border-radius:var(--rmd);}
.qv{font-family:var(--ac);font-size:1.1rem;font-weight:700;}.ql{font-size:.55rem;color:var(--txd);text-transform:uppercase;letter-spacing:.05em;}
.sec{width:100%;max-width:440px;padding:0 20px;margin-top:16px;}
.sec-t{font-size:.67rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txd);margin-bottom:12px;}
.dc{display:flex;align-items:center;gap:14px;padding:15px 17px;background:linear-gradient(135deg,rgba(168,85,247,.12),rgba(0,229,255,.07));border:1px solid rgba(168,85,247,.3);border-radius:var(--rlg);cursor:pointer;transition:var(--t);}
.dc:hover{transform:translateX(4px);border-color:var(--pu);}.dci{font-size:2rem;}.dcb{flex:1;}
.dcn{font-weight:700;font-size:.93rem;color:var(--pu);}.dcd{font-size:.72rem;color:var(--txd);}
.dct{font-family:var(--ac);font-size:.7rem;color:var(--txd);white-space:nowrap;}
.mc{position:relative;overflow:hidden;display:flex;align-items:center;gap:16px;padding:17px 17px;background:var(--bc);border:1px solid var(--br);border-radius:var(--rlg);cursor:pointer;transition:var(--t);text-align:left;margin-bottom:11px;width:100%;}
.mc:hover{background:var(--bch);transform:translateX(4px);}.mc:active{transform:scale(.98);}
.mc.s{border-color:var(--c);box-shadow:0 0 18px var(--cd);}.mc.m{border-color:var(--pu);}.mc.o{border-color:var(--go);}
.mc::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:0 2px 2px 0;}
.mc.s::before{background:var(--c);}.mc.m::before{background:var(--pu);}.mc.o::before{background:var(--go);}
.mci{font-size:2.1rem;flex-shrink:0;}.mcb{flex:1;}.mcn{font-weight:700;font-size:.95rem;margin-bottom:3px;}.mcd{font-size:.73rem;color:var(--txd);line-height:1.4;}
.bdg{position:absolute;top:11px;right:13px;font-size:.62rem;font-weight:700;padding:3px 9px;border-radius:20px;}
.boks{background:rgba(6,214,160,.2);border:1px solid var(--ok);color:var(--ok);}
.bht{background:rgba(255,75,0,.2);border:1px solid var(--fl);color:var(--fl);}
.blv{background:rgba(255,209,102,.15);border:1px solid var(--go);color:var(--go);}
</style></head><body>
<div class="ambient"><div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div><div class="ambient-orb orb-3"></div></div>
<div class="page fade-in"><div class="page-inner">
  <div class="headrow"><span style="width:38px"></span><span style="flex:1"></span><span data-bell></span></div>
  <div class="hero">
    <div style="font-size:.77rem;color:var(--txd)" id="greet"></div>
    <div class="hn" id="hname"></div>
    <div id="hrk" style="margin-top:4px"></div>
    <div class="hb" style="margin-top:10px">⚡</div>
  </div>
  <div class="qs">
    <div class="qc"><div class="qv" id="qxp" style="color:var(--pu)">0</div><div class="ql" id="qxpl"></div></div>
    <div class="qc"><div class="qv" id="qco" style="color:var(--go)">0</div><div class="ql" id="qcol"></div></div>
    <div class="qc"><div class="qv" id="qgm" style="color:var(--pu)">0</div><div class="ql" id="qgml"></div></div>
    <div class="qc"><div class="qv" id="qst" style="color:var(--fl)">0</div><div class="ql" id="qstl"></div></div>
    <div class="qc"><div class="qv" id="qpf" style="color:var(--c)">0</div><div class="ql" id="qpfl"></div></div>
  </div>
  <div class="sec" style="margin-top:20px">
    <div class="sec-t" id="dlbl"></div>
    <div class="dc" onclick="go('daily')">
      <div class="dci">🎯</div>
      <div class="dcb"><div class="dcn" id="dcn"></div><div class="dcd" id="dcd"></div></div>
      <div class="dct" id="dct">--h --m</div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-t" id="mlbl"></div>
    <button class="mc s" onclick="go('solo')"><div class="mci">🧍</div><div class="mcb"><div class="mcn" id="sn"></div><div class="mcd" id="sd"></div></div><span class="bdg boks">SOLO</span></button>
    <button class="mc m" onclick="go('local')"><div class="mci">👥</div><div class="mcb"><div class="mcn" id="ln"></div><div class="mcd" id="ld"></div></div><span class="bdg bht">LOCAL</span></button>
    <button class="mc o" onclick="go('online')"><div class="mci">🌐</div><div class="mcb"><div class="mcn" id="on"></div><div class="mcd" id="od"></div></div><span class="bdg blv">LIVE</span></button>
  </div>
  <div class="sec">
    <div class="sec-t" id="morelbl"></div>
    <div class="qs" style="grid-template-columns:repeat(3,1fr)">
      <div class="qc" style="cursor:pointer" onclick="SFX.navigate();goTo('avatar.html')"><div class="qv">🎨</div><div class="ql" id="qav"></div></div>
      <div class="qc" style="cursor:pointer" onclick="SFX.navigate();goTo('collection.html')"><div class="qv">📒</div><div class="ql" id="qcl"></div></div>
      <div class="qc" style="cursor:pointer" onclick="SFX.navigate();goTo('shop.html')"><div class="qv">🛍️</div><div class="ql" id="qsh"></div></div>
    </div>
  </div>
</div></div>
<nav class="nav-bar">
  <a class="nav-item active" data-nav="menu" href="menu.html"><span class="ni">🏠</span><span data-i18n="nav_home"></span></a>
  <a class="nav-item" data-nav="world" href="world.html"><span class="ni">🌍</span><span data-i18n="nav_world"></span></a>
  <a class="nav-item" data-nav="arcade" href="arcade.html"><span class="ni">🕹️</span><span data-i18n="nav_arcade"></span></a>
  <a class="nav-item" data-nav="profile" href="profile.html"><span class="ni">👤</span><span data-i18n="nav_profile"></span></a>
  <a class="nav-item" data-nav="settings" href="settings.html"><span class="ni">⚙️</span><span data-i18n="nav_settings"></span></a>
</nav>
<script>
window.addEventListener('load',()=>{
  Audio.init();Audio.playMenu();
  const p=loadProfile(),r=getRank(p.xp);
  document.getElementById('greet').textContent=t('menu_greeting');
  document.getElementById('hname').textContent=p.pseudo||'Agent';
  document.getElementById('hrk').innerHTML='<span class="rank-badge '+r.css+'">'+r.icon+' '+t('rank_'+r.id)+'</span>';
  document.getElementById('qxp').textContent=p.xp;
  document.getElementById('qco').textContent=p.coins||0;
  document.getElementById('qgm').textContent=p.gems||0;
  document.getElementById('qst').textContent=p.bestStreak||0;
  document.getElementById('qpf').textContent=p.perfectGames||0;
  document.getElementById('qxpl').textContent=t('menu_xp');
  document.getElementById('qcol').textContent=t('menu_coins');
  document.getElementById('qgml').textContent=t('cur_gems');
  document.getElementById('qstl').textContent=t('menu_streak');
  document.getElementById('qpfl').textContent=t('menu_perfect');
  document.getElementById('dlbl').textContent=t('menu_daily_lbl');
  const dn=Math.floor(Date.now()/86400000)%999+1;
  document.getElementById('dcn').textContent=t('menu_daily_ch')+dn;
  document.getElementById('dcd').textContent=t('menu_daily_desc');
  const now=new Date(),next=new Date(now);next.setHours(24,0,0,0);const diff=next-now;
  document.getElementById('dct').textContent=Math.floor(diff/3600000)+'h '+Math.floor((diff%3600000)/60000)+'m';
  document.getElementById('mlbl').textContent=t('menu_modes_lbl');
  document.getElementById('sn').textContent=t('menu_solo_name');document.getElementById('sd').textContent=t('menu_solo_desc');
  document.getElementById('ln').textContent=t('menu_local_name');document.getElementById('ld').textContent=t('menu_local_desc');
  document.getElementById('on').textContent=t('menu_online_name');document.getElementById('od').textContent=t('menu_online_desc');
  document.getElementById('morelbl').textContent=t('menu_more');
  document.getElementById('qav').textContent=t('menu_avatar');
  document.getElementById('qcl').textContent=t('menu_collection');
  document.getElementById('qsh').textContent=t('menu_shop');
  setActiveNav('menu');setTimeout(()=>narrate('welcome'),500);
});
function go(mode){
  SFX.navigate();
  if(mode==='online'){ window.location.href='setup.html?mode=online'; return; }
  sessionStorage.setItem('fb_mode',mode);window.location.href='setup.html';
}
</script></body></html>
