<!DOCTYPE html><html><head><title>FLASH BRAIN</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<link rel="stylesheet" href="core.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="i18n.js"></script><script src="localnet.js"></script><script src="engine.js"></script><script src="audio.js"></script><script src="boost.js"></script>
<style>
body{padding-bottom:80px;}
.pp{display:flex;flex-direction:column;align-items:center;padding:0 20px 40px;gap:18px;width:100%;}
.ph{display:flex;flex-direction:column;align-items:center;gap:10px;padding:26px 0 8px;text-align:center;width:100%;}
.pav{width:84px;height:84px;border-radius:50%;background:var(--cd);border:2px solid var(--c);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 24px var(--cd);}
.pav svg{width:100%;height:100%;}
.plinks{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:400px;}
.plk{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 6px;background:var(--bc);border:1px solid var(--br);border-radius:var(--rmd);cursor:pointer;transition:var(--t);}
.plk:hover{border-color:var(--c);transform:translateY(-2px);}.plk .pli{font-size:1.6rem;}.plk .pll{font-size:.66rem;font-weight:600;color:var(--txd);}
.pn{font-family:var(--ac);font-size:1.4rem;font-weight:900;}
.psi{font-size:.7rem;color:var(--txd);}
.xpk{width:100%;max-width:400px;padding:18px 20px;background:var(--bc);border:1px solid var(--br);border-radius:var(--rlg);display:flex;flex-direction:column;gap:10px;}
.xkt{display:flex;justify-content:space-between;align-items:center;}
.xkv{font-family:var(--ac);font-size:1.4rem;font-weight:700;color:var(--pu);}
.xkbar{height:10px;background:var(--br);border-radius:5px;overflow:hidden;}
.xkf{height:100%;background:var(--pu);border-radius:5px;transition:width 1s;box-shadow:0 0 8px var(--pu);}
.xkls{display:flex;justify-content:space-between;font-size:.68rem;color:var(--txd);}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:400px;}
.st{display:flex;flex-direction:column;gap:4px;padding:14px;background:var(--bc);border:1px solid var(--br);border-radius:var(--rmd);}
.stv{font-family:var(--ac);font-size:1.4rem;font-weight:700;}.stl{font-size:.66rem;color:var(--txd);text-transform:uppercase;letter-spacing:.06em;}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:400px;}
.ac{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;padding:12px 6px;background:var(--bc);border:1px solid var(--br);border-radius:var(--rmd);}
.ac.done{border-color:var(--go);background:rgba(255,209,102,.06);}.ac:not(.done){opacity:.3;filter:grayscale(1);}
.aci{font-size:1.6rem;}.acl{font-size:.62rem;font-weight:600;line-height:1.3;}
.rd{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px;}
.rr{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bc);border:1px solid var(--br);border-radius:var(--rmd);}
.rr.cur{border-color:var(--c);background:var(--cd);}.rr.dn{opacity:.5;}
.rri{font-size:1.5rem;flex-shrink:0;}.rrn{font-weight:700;font-size:.9rem;}.rrx{font-size:.7rem;color:var(--txd);}
.eb{width:100%;max-width:400px;}.erow{display:flex;gap:10px;}.erow .f-input{flex:1;}
.sb2{padding:0 18px;height:48px;background:var(--c);color:#04040a;font-weight:700;border-radius:var(--rmd);border:none;cursor:pointer;white-space:nowrap;transition:var(--t);}.sb2:hover{filter:brightness(1.1);}
.frl{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px;}
.frr{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bc);border:1px solid var(--br);border-radius:var(--rmd);}
.frr .nm{flex:1;font-weight:600;font-size:.88rem;}
.frx{background:transparent;border:none;color:var(--er);font-size:1.1rem;cursor:pointer;}
.dz{width:100%;max-width:400px;padding:16px;border:1px solid rgba(239,71,111,.2);border-radius:var(--rmd);display:flex;flex-direction:column;gap:10px;}
.dzt{font-size:.73rem;font-weight:700;color:var(--er);text-transform:uppercase;letter-spacing:.08em;}.dzd{font-size:.78rem;color:var(--txd);}
.dzb{padding:10px 16px;background:transparent;border:1px solid var(--er);border-radius:var(--rsm);color:var(--er);font-size:.85rem;cursor:pointer;align-self:flex-start;transition:var(--t);}.dzb:hover{background:rgba(239,71,111,.1);}
.sl2{font-size:.69rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txd);align-self:flex-start;width:100%;max-width:400px;}
</style></head><body>
<div class="ambient"><div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div><div class="ambient-orb orb-3"></div></div>
<div class="page fade-in"><div class="page-inner"><div class="pp" id="pp"></div></div></div>
<nav class="nav-bar">
  <a class="nav-item" data-nav="menu" href="menu.html"><span class="ni">🏠</span><span data-i18n="nav_home"></span></a>
  <a class="nav-item" data-nav="world" href="world.html"><span class="ni">🌍</span><span data-i18n="nav_world"></span></a>
  <a class="nav-item" data-nav="arcade" href="arcade.html"><span class="ni">🕹️</span><span data-i18n="nav_arcade"></span></a>
  <a class="nav-item active" data-nav="profile" href="profile.html"><span class="ni">👤</span><span data-i18n="nav_profile"></span></a>
  <a class="nav-item" data-nav="settings" href="settings.html"><span class="ni">⚙️</span><span data-i18n="nav_settings"></span></a>
</nav>
<script>
function render(){
  Audio.init();
  const p=loadProfile(),r=getRank(p.xp),n=getNextRank(p.xp),pct=getXPPct(p.xp);
  const since=p.createdAt?new Date(p.createdAt).toLocaleDateString(getLang()==='en'?'en-GB':'fr-FR'):'---';
  let h='';
  h+='<div class="headrow"><span style="width:38px"></span><span style="flex:1"></span><span data-bell></span></div>';
  h+='<div class="ph"><div class="pav">'+renderAvatar(p.avatar,84)+'</div><div class="pn">'+(p.pseudo||'Agent')+'</div><span class="rank-badge '+r.css+'">'+r.icon+' '+t('rank_'+r.id)+'</span><div class="psi">'+t('pro_since')+' '+since+'</div></div>';
  h+='<div class="xpk"><div class="xkt"><div><div style="font-size:.7rem;color:var(--txd);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">'+t('pro_rank_lbl')+'</div><div style="font-weight:700">'+r.icon+' '+t('rank_'+r.id)+'</div></div><div class="xkv">'+p.xp+' XP</div></div><div class="xkbar"><div class="xkf" id="xkf" style="width:0%"></div></div><div class="xkls"><span>'+r.minXP+' XP</span><span>'+(n?n.minXP+' XP → '+n.icon+' '+t('rank_'+n.id):t('pro_rank_max'))+'</span></div></div>';
  h+='<div class="sg"><div class="st"><span class="stv" style="color:var(--go)">'+p.gamesPlayed+'</span><span class="stl">'+t('pro_games')+'</span></div><div class="st"><span class="stv" style="color:var(--ok)">'+p.wins+'</span><span class="stl">'+t('pro_wins')+'</span></div><div class="st"><span class="stv" style="color:var(--fl)">'+p.bestStreak+'</span><span class="stl">'+t('pro_streak')+'</span></div><div class="st"><span class="stv" style="color:var(--c)">'+p.totalCorrect+'</span><span class="stl">'+t('pro_correct')+'</span></div><div class="st"><span class="stv" style="color:var(--go)">'+(p.coins||0)+'</span><span class="stl">'+t('pro_coins')+'</span></div><div class="st"><span class="stv" style="color:var(--pu)">'+(p.gems||0)+'</span><span class="stl">'+t('cur_gems')+'</span></div></div>';
  // QUICK LINKS
  h+='<div class="plinks"><div class="plk" onclick="SFX.navigate();goTo(\'avatar.html\')"><div class="pli">🎨</div><div class="pll">'+t('menu_avatar')+'</div></div><div class="plk" onclick="SFX.navigate();goTo(\'collection.html\')"><div class="pli">📒</div><div class="pll">'+t('menu_collection')+' '+collectionCount(p)+'/'+CHARACTERS.length+'</div></div><div class="plk" onclick="SFX.navigate();goTo(\'shop.html\')"><div class="pli">🛍️</div><div class="pll">'+t('menu_shop')+'</div></div></div>';
  // FRIENDS -> amis reels dans l'onglet Monde
  h+='<div class="sl2">'+t('pro_friends_ttl')+'</div>';
  h+='<div class="dc" style="max-width:400px" onclick="SFX.navigate();goTo(\'world.html?tab=friends\')"><div class="dci">👥</div><div class="dcb"><div class="dcn" style="color:var(--c)">'+t('fr_title')+'</div><div class="dcd">'+t('fr_add')+' · 💬</div></div><div class="dct">→</div></div>';
  // ACHIEVEMENTS
  h+='<div class="sl2">'+t('pro_ach_ttl')+' ('+(p.achievements?.length||0)+'/'+ACHIEVEMENTS.length+')</div>';
  h+='<div class="ag">'+ACHIEVEMENTS.map(a=>'<div class="ac '+(p.achievements?.includes(a.id)?'done':'')+'"><div class="aci">'+a.icon+'</div><div class="acl">'+t('ach_'+a.id)+'</div></div>').join('')+'</div>';
  // AVANTAGES DE GRADE (#2)
  h+='<div class="sl2">'+t('pro_perks_ttl')+'</div>';
  const curPerks=rankPerks(r);const nxtPerks=n?rankPerks(n):[];
  h+='<div class="xpk" style="gap:14px">';
  h+='<div><div style="font-size:.7rem;color:var(--txd);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">'+t('pro_perks_cur')+' · '+r.icon+' '+t('rank_'+r.id)+'</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:8px">'+(curPerks.length?curPerks.map(x=>'<span class="rank-badge '+r.css+'" style="font-size:.74rem">'+x+'</span>').join(''):'<span class="psi">'+t('pro_perks_none')+'</span>')+'</div></div>';
  if(n){h+='<div style="border-top:1px solid var(--br);padding-top:12px"><div style="font-size:.7rem;color:var(--txd);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">'+t('pro_perks_next')+' · '+n.icon+' '+t('rank_'+n.id)+'</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:8px">'+(nxtPerks.length?nxtPerks.map(x=>'<span class="rank-badge" style="font-size:.74rem;opacity:.65">'+x+'</span>').join(''):'<span class="psi">—</span>')+'</div></div>';}
  h+='</div>';
  h+='<div class="sl2">'+t('pro_road_ttl')+'</div>';
  h+='<div class="rd">'+RANKS.map(rk=>{const done=p.xp>=rk.minXP,cur=rk.id===r.id;const perk=rk.coinMult>1?(' · x'+rk.coinMult.toFixed(2)+' 🪙'):'';return'<div class="rr '+(cur?'cur':done?'dn':'')+'"><div class="rri">'+rk.icon+'</div><div style="flex:1"><div class="rrn">'+t('rank_'+rk.id)+'</div><div class="rrx">'+rk.minXP+' '+t('pro_xp_req')+perk+(rk.gemReward?' · +'+rk.gemReward+' 💎':'')+'</div></div><div>'+(done?(cur?'⚡':'✓'):'🔒')+'</div></div>';}).join('')+'</div>';
  h+='<div class="sl2">'+t('pro_edit_ttl')+'</div><div class="eb"><div class="erow"><input type="text" id="ep" class="f-input" value="'+(p.pseudo||'')+'" maxlength="18" autocomplete="off"><button class="sb2" onclick="savePseudo()">'+t('pro_save')+'</button></div></div>';
  h+='<div class="dz"><div class="dzt">'+t('pro_danger')+'</div><div class="dzd">'+t('pro_danger_desc')+'</div><button class="dzb" onclick="confirmReset()">'+t('pro_reset')+'</button></div>';
  document.getElementById('pp').innerHTML=h;
  if(typeof mountBell==='function')mountBell();
  setTimeout(()=>{const f=document.getElementById('xkf');if(f)f.style.width=pct+'%';},300);
  setActiveNav('profile');
}
function savePseudo(){const v=document.getElementById('ep')?.value.trim();if(!v){showToast(t('pro_save_err'),'warn');return;}const p=loadProfile();p.pseudo=v;saveProfile(p);fbSetScore(v,p.xp,getRank(p.xp).id);if(typeof Social!=='undefined')Social.publishMe&&Social.publishMe();showToast(t('pro_save_ok'),'success');SFX.correct();setTimeout(render,500);}
function confirmReset(){if(confirm(t('pro_reset_confirm'))){localStorage.removeItem('fb_profile');showToast(t('pro_reset_done'),'danger');setTimeout(()=>window.location.href='index.html',1000);}}
window.addEventListener('load',render);
</script></body></html>
